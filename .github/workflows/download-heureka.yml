name: Download and Convert Heureka Export_CZ

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *" # every day at 08:00 Prague (summer)
    - cron: "0 10 * * *" # every day at 12:00 Prague (summer)

permissions:
  contents: write

jobs:
  download-convert-trim:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq npm
          npm install -g xml-js

      - name: Download XML file
        run: |
          curl -fL --retry 5 --retry-delay 10 --retry-all-errors \
            -A "Mozilla/5.0 (compatible; GitHubActions/1.0)" \
            -o heureka_reviews_cz.xml \
            "https://www.heureka.cz/direct/dotaznik/export-review.php?key=43470027a41b7d12cb8121f48a5b6369"
          # Fail early if response is HTML instead of XML
          if head -c 200 heureka_reviews_cz.xml | grep -qiE '<!doctype html|<html|<head'; then
            echo "ERROR: Heureka returned an HTML page instead of XML. First 500 bytes:"
            head -c 500 heureka_reviews_cz.xml
            exit 1
          fi
          if ! head -c 200 heureka_reviews_cz.xml | grep -qiE '<\?xml|<reviews'; then
            echo "ERROR: Downloaded file does not look like the expected XML feed. First 500 bytes:"
            head -c 500 heureka_reviews_cz.xml
            exit 1
          fi

      - name: Sanitize XML (escape stray ampersands and stray <)
        run: |
          # Escape stray & not part of an entity
          perl -i -pe 's/&(?!(?:amp|lt|gt|quot|apos|#\d+|#x[0-9A-Fa-f]+);)/&amp;/g' heureka_reviews_cz.xml
          # Escape stray < that isn't followed by a valid XML name-start, ?, !, or /
          # This catches things like "< 5" or stray HTML fragments in review text outside CDATA.
          perl -i -pe 's{<(?![A-Za-z_/?!])}{&lt;}g' heureka_reviews_cz.xml

      - name: Convert XML to JSON (preserves CDATA)
        run: |
          npx xml-js heureka_reviews_cz.xml --compact --spaces 2 > heureka_reviews_cz.json

      - name: Trim to first 50 reviews and remove _declaration
        run: |
          jq 'del(._declaration) | .reviews.review |= .[:50]' heureka_reviews_cz.json > trimmed.json
          mv trimmed.json heureka_reviews_cz.json

      # Optional: Convert back to XML if you want both versions
      # - name: Convert JSON back to XML
      #   run: |
      #     npx xml-js heureka_reviews_cz.json --compact --spaces 2 --reverse > heureka_reviews_cz.xml

      - name: Commit and push changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add heureka_reviews_cz.json
          git commit -m "Update heureka_reviews_cz.json with first 20 reviews and removed declaration" || echo "No changes to commit"
          git push
