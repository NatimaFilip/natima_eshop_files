name: Sync Google Sheets to JSON

on:
  # Run manually from GitHub Actions tab
  workflow_dispatch:

  # Run on a schedule (every 6 hours) — adjust as needed
  schedule:
    - cron: "0 */6 * * *"

  # Also run on push to main (optional)
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - ".github/workflows/sync-sheets.yml"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Fetch Google Sheets and generate JSON
        run: node scripts/fetch-sheets.js
        env:
          SPREADSHEET_ID: ${{ vars.SPREADSHEET_ID || '1kE3gWN9oU5_tLTDs9E9XTqdGJy_hIBJvGOr_HqrEhzA' }}

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync Google Sheets data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
